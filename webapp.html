<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Room Redesign</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #141414;
      border-bottom: 1px solid #252525;
      flex-shrink: 0;
    }

    .upload-btn {
      position: relative;
      width: 42px; height: 42px;
      border-radius: 8px;
      border: 1.5px dashed #3a3a3a;
      background: #1a1a1a;
      cursor: pointer;
      flex-shrink: 0;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .upload-btn:hover { border-color: #666; }
    .upload-btn input {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .upload-btn .cam { font-size: 18px; pointer-events: none; }
    .upload-btn img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
      display: none;
    }

    .prompt-wrap {
      flex: 1;
      position: relative;
    }
    .prompt-input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .prompt-input:focus  { border-color: #4a4a4a; }
    .prompt-input::placeholder { color: #484848; }

    .run-btn {
      padding: 10px 18px;
      background: #2563eb;
      color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .run-btn:hover:not(:disabled) { background: #3b82f6; }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Main area ───────────────────────────────────────────── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Viewer */
    .viewer-wrap {
      flex: 1;
      position: relative;
      background: #0a0a0a;
      overflow: hidden;
    }

    .drop-hint {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      color: #383838;
      pointer-events: none;
      user-select: none;
    }
    .drop-hint .icon { font-size: 52px; }
    .drop-hint .text { font-size: 13px; }

    .viewer-btns {
      position: absolute;
      bottom: 18px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: none;
      gap: 8px;
      align-items: center;
    }
    .orbit-btn, .pc-btn, .dive-btn {
      padding: 8px 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      color: #ccc;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .orbit-btn:hover, .pc-btn:hover, .dive-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
    .orbit-btn.active { background: rgba(99,102,241,0.35); border-color: rgba(99,102,241,0.6); color: #fff; }
    .pc-btn.active    { background: rgba(16,185,129,0.35);  border-color: rgba(16,185,129,0.6);  color: #fff; }
    .dive-btn.active  { background: rgba(245,158,11,0.35);  border-color: rgba(245,158,11,0.6);  color: #fff; }

    #gs-root {
      width: 100%; height: 100%;
      position: relative;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: 290px;
      flex-shrink: 0;
      background: #111;
      border-left: 1px solid #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-title {
      padding: 12px 14px 8px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
    }

    .log {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 16px;
    }
    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    /* Preview image */
    .preview-block {
      padding: 10px 14px;
      border-bottom: 1px solid #1a1a1a;
    }
    .preview-block .plabel {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #484848;
      margin-bottom: 6px;
    }
    .preview-block img {
      width: 100%; border-radius: 5px; display: block;
    }

    /* Step row */
    .step {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 14px;
      border-bottom: 1px solid #181818;
    }

    .step-icon {
      flex-shrink: 0;
      margin-top: 1px;
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
    }

    /* spinner */
    .spin-ring {
      width: 12px; height: 12px;
      border: 1.5px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .step-body { flex: 1; min-width: 0; }

    .step-label {
      font-size: 12px;
      font-weight: 500;
      color: #bbb;
      line-height: 1.4;
    }
    .step.running .step-label { color: #e0e0e0; }
    .step.done    .step-label { color: #999; }
    .step.error   .step-label { color: #f87171; }

    .step-detail {
      font-size: 10.5px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #525252;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 3px;
      line-height: 1.5;
    }

    .step-time {
      font-size: 9.5px;
      color: #3a3a3a;
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-left: auto;
      flex-shrink: 0;
      padding-top: 1px;
    }
    .step.done .step-time { color: #4ade80; }
    .step.error .step-time { color: #f87171; }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <label class="upload-btn" id="upload-btn" title="Upload room photo">
    <span class="cam">📷</span>
    <img id="thumb">
    <input type="file" id="photo-input" accept="image/*">
  </label>

  <div class="prompt-wrap">
    <input
      class="prompt-input"
      id="prompt"
      type="text"
      placeholder="Describe the redesign — e.g. 'Turn this into a moody speakeasy bar with leather seating'"
    value="Remove all couches from the main room. Add in a pool table with an orange felt and a woman in pink shorts playing on it. On the far side, put in a home office. The floor should have long horizontal white oak planks"
      autocomplete="off"
    >
  </div>

  <button class="run-btn" id="run-btn" disabled>Redesign →</button>
</div>

<!-- Main -->
<div class="main">

  <div class="viewer-wrap">
    <div class="drop-hint" id="drop-hint">
      <span class="icon">🏠</span>
      <span class="text">Enter a prompt and hit Redesign →</span>
    </div>
    <div id="gs-root"></div>
    <div id="fade-overlay" style="position:absolute;inset:0;background:#000;opacity:0;
      pointer-events:none;z-index:5;transition:none;"></div>
    <div id="cam-hud" style="display:none;position:absolute;top:10px;left:10px;z-index:20;
      background:rgba(0,0,0,0.6);color:#0f0;font:11px/1.6 monospace;padding:6px 10px;
      border-radius:6px;pointer-events:none;"></div>
    <div id="anim-panel" style="display:none;position:absolute;bottom:60px;left:50%;
      transform:translateX(-50%);z-index:10;display:none;gap:8px;align-items:center;">
      <select id="anim-select" style="padding:7px 14px;background:rgba(0,0,0,0.75);
        border:1px solid rgba(255,255,255,0.12);border-radius:20px;color:#ccc;
        font-size:12px;font-weight:500;cursor:pointer;outline:none;
        backdrop-filter:blur(8px);appearance:none;-webkit-appearance:none;
        padding-right:28px;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%226%22><path d=%22M0 0l5 6 5-6%22 fill=%22%23888%22/></svg>');
        background-repeat:no-repeat;background-position:right 10px center;">
        <option value="shockwave">⚡ Shockwave</option>
        <option value="vortex">🌀 Vortex</option>
        <option value="bigbang">💥 Big Bang</option>
        <option value="mesh">🔗 Neural Mesh</option>
        <option value="wave">🌊 Wave</option>
      </select>
      <button id="anim-play-btn" style="padding:7px 18px;background:rgba(255,255,255,0.07);
        border:1px solid rgba(255,255,255,0.12);border-radius:20px;color:#ccc;
        font-size:12px;font-weight:500;cursor:pointer;backdrop-filter:blur(8px);
        white-space:nowrap;transition:background 0.15s,color 0.15s;">▶ Play</button>
    </div>
    <div class="viewer-btns" id="viewer-btns">
      <button class="orbit-btn" id="orbit-btn">✦ Orbit</button>
      <button class="pc-btn"    id="pc-btn">⬡ Point Cloud</button>
      <button class="dive-btn"  id="dive-btn">⊙ Center Zoom</button>
      <button class="orbit-btn" id="dl-btn" title="Download PLY">⬇ PLY</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-title">Pipeline</div>
    <div class="log" id="log"></div>
  </div>

</div>

<script src="/public/gs-bundle.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let uploadedFile   = null;
let activeViewer   = null;
let lastEditedUrl  = null;   // URL of last AI Makeover result — used as base for next run
let runCount       = 0;      // increments each run, used to namespace step IDs
let runPrefix      = '';     // current run's step ID prefix
const stepEls      = {};
const stepStarts   = {};     // step id → Date when it started

const DEFAULT_IMAGE = '/input/default_room.png';

// ── Upload ────────────────────────────────────────────────────────────────────
const photoInput = document.getElementById('photo-input');
const thumb      = document.getElementById('thumb');
const runBtn     = document.getElementById('run-btn');
const promptEl   = document.getElementById('prompt');

// Pre-load default image as a File object
fetch(DEFAULT_IMAGE)
  .then(r => r.blob())
  .then(blob => {
    const file = new File([blob], 'default_room.png', { type: blob.type || 'image/png' });
    uploadedFile = file;
    thumb.src = DEFAULT_IMAGE;
    thumb.style.display = 'block';
    document.querySelector('#upload-btn .cam').style.display = 'none';
    checkReady();
  });

// Auto-load default splat on startup — defer until layout is settled
window.addEventListener('load', async () => {
  document.getElementById('drop-hint').style.display = 'none';
  upsertStep('default_load', 'Loading default model', 'running', 'output/default.ply');
  try {
    await loadPly('/output/default.ply');
    await playIntroAnim();
    upsertStep('default_load', 'Loading default model', 'done', 'Ready — drag to orbit');
    viewerBtns.style.display = 'flex'; animPanel.style.display = 'flex';
  } catch (e) {
    upsertStep('default_load', 'Loading default model', 'error', e.message);
  }
});

photoInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  uploadedFile = file;
  lastEditedUrl = null;   // new photo resets the edit chain
  thumb.src = URL.createObjectURL(file);
  thumb.style.display = 'block';
  document.querySelector('#upload-btn .cam').style.display = 'none';
  checkReady();
});

promptEl.addEventListener('input', checkReady);
promptEl.addEventListener('keydown', e => {
  e.stopPropagation();   // prevent viewer controls capturing keystrokes
  if (e.key === 'Enter' && !runBtn.disabled) go();
});
promptEl.addEventListener('keyup',   e => e.stopPropagation());
promptEl.addEventListener('keypress', e => e.stopPropagation());
promptEl.addEventListener('focus', () => {
  if (activeViewer && activeViewer.controls)
    activeViewer.controls.enabled = false;
});
promptEl.addEventListener('blur', () => {
  if (activeViewer && activeViewer.controls)
    activeViewer.controls.enabled = true;
});

function checkReady() {
  runBtn.disabled = !(uploadedFile && promptEl.value.trim());
}

// ── Run ───────────────────────────────────────────────────────────────────────
runBtn.addEventListener('click', go);

async function go() {
  if (!uploadedFile || !promptEl.value.trim()) return;

  runBtn.disabled = true;
  stopOrbit();
  if (diveRaf) { cancelAnimationFrame(diveRaf); diveRaf = null; diveBtn.classList.remove('active'); diveBtn.textContent = '⊙ Center Zoom'; }
  // reset point cloud for new scene
  if (pointsObject) { pointsObject.geometry.dispose(); pointsObject = null; }
  pointCloudMode = false;
  pcBtn.textContent = '⬡ Point Cloud';
  pcBtn.classList.remove('active');
  runCount++;
  runPrefix = `r${runCount}_`;
  document.getElementById('drop-hint').style.display = 'none';

  // Use last AI Makeover result as base if available, otherwise original upload
  const baseFile = await currentBaseFile();
  addRunDivider(runCount, promptEl.value.trim());
  addPreview(URL.createObjectURL(baseFile), lastEditedUrl ? 'Base (last edit)' : 'Original');

  const form = new FormData();
  form.append('image', baseFile);
  form.append('prompt', promptEl.value.trim());

  let sessionId;
  try {
    console.log('[redesign] POST /api/redesign', { prompt: promptEl.value.trim(), file: baseFile.name, size: baseFile.size });
    const res  = await fetch('/api/redesign', { method: 'POST', body: form });
    const data = await res.json();
    console.log('[redesign] session response', data);
    if (data.error) throw new Error(data.error);
    sessionId = data.session_id;
  } catch (err) {
    upsertStep('err', 'Request failed', 'error', err.message);
    runBtn.disabled = false;
    return;
  }

  // Poll /api/status every 500ms — works through Cloudflare (no buffering unlike SSE)
  console.log('[redesign] polling /api/status/' + sessionId);
  const prefix = runPrefix;   // capture for this run's closure
  let pollIdx  = 0;
  let pollTimer = null;

  async function poll() {
    try {
      const res  = await fetch(`/api/status/${sessionId}?after=${pollIdx}`);
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`HTTP ${res.status} from /api/status — server may need restart. Body: ${text.slice(0,120)}`);
      }
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      for (const ev of data.events) {
        pollIdx++;
        console.log('[poll]', ev.type, ev);

        if (ev.type === 'step') {
          upsertStep(prefix + ev.id, ev.label, ev.status, ev.detail || '', ev.image);

        } else if (ev.type === 'done') {
          const plyUrl = ev.ply_url;
          console.log('[redesign] done — fetching PLY', plyUrl);

          upsertStep(prefix + 'download', 'Downloading PLY', 'running', plyUrl);
          const dlT0 = Date.now();
          const plyResp = await fetch(plyUrl);
          const plyBlob = await plyResp.blob();
          const dlSec  = ((Date.now() - dlT0) / 1000).toFixed(1);
          const sizeMB = (plyBlob.size / 1e6).toFixed(1);
          console.log(`[redesign] PLY downloaded ${sizeMB} MB in ${dlSec}s`);
          upsertStep(prefix + 'download', 'Downloading PLY', 'done', `${dlSec}s — ${sizeMB} MB`);

          upsertStep(prefix + 'load', 'Parsing & rendering', 'running', '');
          await loadPly(plyUrl);
          upsertStep(prefix + 'load', 'Parsing & rendering', 'done', 'Ready — drag to orbit');
          viewerBtns.style.display = 'flex'; animPanel.style.display = 'flex';
          if (ev.edited_image_url) {
            lastEditedUrl = ev.edited_image_url;
            thumb.src = lastEditedUrl;
          }
          runBtn.disabled = false;
          return;   // stop polling

        } else if (ev.type === 'error') {
          console.error('[redesign] pipeline error', ev.message);
          for (const [id, el] of Object.entries(stepEls)) {
            if (el.classList.contains('running')) {
              el.classList.replace('running', 'error');
              el.querySelector('.step-icon').innerHTML = iconFor('error');
            }
          }
          upsertStep(prefix + 'err', 'Error', 'error', ev.message);
          runBtn.disabled = false;
          return;   // stop polling
        }
      }
      pollTimer = setTimeout(poll, 500);
    } catch (err) {
      console.error('[poll] error', err);
      upsertStep(prefix + 'err', 'Error', 'error', err.message);
      runBtn.disabled = false;
    }
  }
  poll();
}

// ── Viewer buttons ────────────────────────────────────────────────────────────
let orbitRaf      = null;
let diveRaf       = null;
let pointsObject  = null;
let pointCloudMode = false;
const orbitBtn    = document.getElementById('orbit-btn');
const pcBtn       = document.getElementById('pc-btn');
const diveBtn     = document.getElementById('dive-btn');
const dlBtn       = document.getElementById('dl-btn');
const viewerBtns  = document.getElementById('viewer-btns');

let currentPlyUrl = null;   // set each time a PLY loads

dlBtn.addEventListener('click', () => {
  if (!currentPlyUrl) return;
  const a = document.createElement('a');
  a.href = currentPlyUrl;
  a.download = currentPlyUrl.split('/').pop() || 'splat.ply';
  a.click();
});

orbitBtn.addEventListener('click', toggleOrbit);
pcBtn.addEventListener('click', togglePointCloud);
diveBtn.addEventListener('click', startDiveIn);

function toggleOrbit() {
  if (orbitRaf) {
    stopOrbit();
  } else {
    startOrbit();
  }
}

function startOrbit() {
  if (!activeViewer) return;
  const controls = activeViewer.controls;
  const camera   = activeViewer.camera;
  const target   = controls ? controls.target.clone() : new THREE.Vector3();

  if (controls) { controls.enableRotate = false; controls.enablePan = false; }

  const startPos = camera.position.clone();
  const radius   = startPos.distanceTo(target);
  let angle      = Math.atan2(startPos.z - target.z, startPos.x - target.x);

  orbitBtn.textContent = '■ Stop';
  orbitBtn.classList.add('active');

  function step() {
    angle += 0.008;
    camera.position.set(
      target.x + radius * Math.cos(angle),
      camera.position.y,
      target.z + radius * Math.sin(angle)
    );
    camera.lookAt(target);
    orbitRaf = requestAnimationFrame(step);
  }
  orbitRaf = requestAnimationFrame(step);
}

function stopOrbit() {
  if (orbitRaf) { cancelAnimationFrame(orbitRaf); orbitRaf = null; }
  orbitBtn.textContent = '✦ Orbit';
  orbitBtn.classList.remove('active');
  if (activeViewer && activeViewer.controls) {
    activeViewer.controls.enableRotate = true;
    activeViewer.controls.enablePan    = true;
  }
}

function startDiveIn() {
  if (!activeViewer) return;
  stopOrbit();

  // Cancel any in-progress dive
  if (diveRaf) { cancelAnimationFrame(diveRaf); diveRaf = null; }

  const cam      = activeViewer.camera;
  const controls = activeViewer.controls;
  const target   = controls ? controls.target.clone() : new THREE.Vector3();

  const startPos = cam.position.clone();
  const dir      = startPos.clone().sub(target).normalize();
  const endPos   = target.clone().add(dir.multiplyScalar(7.15));

  const DURATION = 3200;   // ms
  const startTime = performance.now();

  diveBtn.classList.add('active');
  diveBtn.textContent = '⊙ Diving…';
  if (controls) controls.enabled = false;

  function tick(now) {
    const t    = Math.min((now - startTime) / DURATION, 1);
    // Ease-in-out cubic
    const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;

    cam.position.lerpVectors(startPos, endPos, ease);
    cam.lookAt(target);
    if (controls) controls.update();

    if (t < 1) {
      diveRaf = requestAnimationFrame(tick);
    } else {
      diveRaf = null;
      diveBtn.classList.remove('active');
      diveBtn.textContent = '⊙ Center Zoom';
      if (controls) {
        controls.target.copy(target);
        controls.enabled = true;
        controls.update();
      }
    }
  }
  diveRaf = requestAnimationFrame(tick);
}

// ── Point Cloud Animations ─────────────────────────────────────────────────
const animPanel   = document.getElementById('anim-panel');
const animSelect  = document.getElementById('anim-select');
const animPlayBtn = document.getElementById('anim-play-btn');

let animRaf     = null;
let animPts     = null;   // THREE.Points owned by animation system
let animOrigPos = null;   // Float32Array — original positions for restore
let animLines   = null;   // THREE.LineSegments for Neural Mesh
let animCX = 0, animCY = 0, animCZ = 0;  // centroid

const ANIM_STEP = 8;  // sample every 8th splat for animation cloud

animPlayBtn.addEventListener('click', () => animRaf ? stopAnim() : startAnim());

function startAnim() {
  if (!activeViewer) return;
  stopAnim();
  if (!animPts) _buildAnimCloud();
  if (!animPts) return;

  // Hide splat, show anim point cloud
  if (activeViewer.splatMesh) activeViewer.splatMesh.visible = false;
  animPts.visible = true;
  animPts.material.size = 0.022;

  const name = animSelect.value;
  if (name === 'mesh') _buildNeuralMesh();

  animPlayBtn.textContent = '■ Stop';
  animPlayBtn.style.color = '#f87171';
  const t0 = performance.now();

  function loop(now) {
    const t = (now - t0) / 1000;
    if      (name === 'shockwave') _tickShockwave(t);
    else if (name === 'vortex')    _tickVortex(t);
    else if (name === 'bigbang')   _tickBigBang(t);
    else if (name === 'mesh')      _tickMesh(t);
    else if (name === 'wave')      _tickWave(t);
    animRaf = requestAnimationFrame(loop);
  }
  animRaf = requestAnimationFrame(loop);
}

function stopAnim() {
  if (animRaf) { cancelAnimationFrame(animRaf); animRaf = null; }
  animPlayBtn.textContent = '▶ Play';
  animPlayBtn.style.color = '';

  // Restore original positions
  if (animPts && animOrigPos) {
    animPts.geometry.attributes.position.array.set(animOrigPos);
    animPts.geometry.attributes.position.needsUpdate = true;
    animPts.material.size = 0.022;
    animPts.visible = false;
  }
  // Remove mesh lines
  if (animLines && activeViewer) {
    activeViewer.threeScene.remove(animLines);
    animLines.geometry.dispose(); animLines.material.dispose();
    animLines = null;
  }
  // Restore splat / point cloud state
  if (activeViewer && activeViewer.splatMesh) {
    activeViewer.splatMesh.visible = !pointCloudMode;
    if (pointsObject) pointsObject.visible = pointCloudMode;
  }
}

// ── Intro Animation ────────────────────────────────────────────────────────
// Phase 1 – Assembly  : dots scattered randomly in space fly to their positions
// Phase 2 – Pause     : hold on the assembled point cloud
// Phase 3 – Fade      : point cloud fades out, photorealistic splat revealed underneath
async function playIntroAnim() {
  if (!activeViewer) return;
  _buildAnimCloud();
  if (!animPts) return;

  const splat    = activeViewer.splatMesh;
  const controls = activeViewer.controls;
  const posArr   = animPts.geometry.attributes.position.array;
  const n        = animOrigPos.length / 3;

  // ── Scatter: random sphere around centroid, 3× scene radius ──────────────
  let maxD = 0;
  for (let i = 0; i < n; i++) {
    const dx = animOrigPos[i*3]-animCX, dy = animOrigPos[i*3+1]-animCY, dz = animOrigPos[i*3+2]-animCZ;
    const d  = Math.sqrt(dx*dx+dy*dy+dz*dz);
    if (d > maxD) maxD = d;
  }
  // Dots start close together (0.4× scene radius) so they look like a merging blob
  const scatterR = maxD * 0.4;

  const startPos = new Float32Array(animOrigPos.length);
  for (let i = 0; i < n; i++) {
    const h1 = ((Math.sin(i * 127.1 + 311.7) * 43758.5453) % 1 + 1) % 1;
    const h2 = ((Math.sin(i * 269.5 + 183.3) * 43758.5453) % 1 + 1) % 1;
    const h3 = ((Math.sin(i *  47.3 +  91.1) * 43758.5453) % 1 + 1) % 1;
    const theta = h1 * Math.PI * 2;
    const phi   = Math.acos(2 * h2 - 1);          // uniform on sphere
    const r     = scatterR * (0.3 + h3 * 0.7);    // tighter cluster, all within scene
    startPos[i*3]   = animCX + r * Math.sin(phi) * Math.cos(theta);
    startPos[i*3+1] = animCY + r * Math.cos(phi);
    startPos[i*3+2] = animCZ + r * Math.sin(phi) * Math.sin(theta);
  }

  posArr.set(startPos);
  animPts.geometry.attributes.position.needsUpdate = true;
  animPts.material.opacity = 1.0;   // reset to fully opaque for each play
  animPts.visible = true;
  splat.visible   = false;

  // Lock controls during the intro
  if (controls) { controls.enabled = false; controls.autoRotate = false; }

  const overlay = document.getElementById('fade-overlay');

  // ── Timing ────────────────────────────────────────────────────────────────
  const T_ASSEMBLE  = 2.2;   // dots fly in
  const T_PAUSE     = 3.2;   // 1s pause on cloud
  const T_FADE_OUT  = 3.9;   // overlay fully black (point cloud hidden)
  const T_SWAP      = 3.9;   // swap happens at full black
  const T_FADE_IN   = 5.0;   // overlay fades out, splat fully revealed
  const T_TOTAL     = 5.0;

  let assembled = false;
  let swapped   = false;
  const t0 = performance.now();

  return new Promise(resolve => {
    function tick(now) {
      const t = (now - t0) / 1000;

      // ── Phase 1: Assembly ────────────────────────────────────────────────
      if (t < T_ASSEMBLE) {
        const p    = t / T_ASSEMBLE;
        const ease = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2, 3) / 2;
        for (let i = 0; i < n; i++) {
          posArr[i*3]   = startPos[i*3]   + (animOrigPos[i*3]   - startPos[i*3])   * ease;
          posArr[i*3+1] = startPos[i*3+1] + (animOrigPos[i*3+1] - startPos[i*3+1]) * ease;
          posArr[i*3+2] = startPos[i*3+2] + (animOrigPos[i*3+2] - startPos[i*3+2]) * ease;
        }
        animPts.geometry.attributes.position.needsUpdate = true;

      // ── Phase 2: Pause ───────────────────────────────────────────────────
      } else if (t < T_PAUSE) {
        if (!assembled) {
          assembled = true;
          posArr.set(animOrigPos);
          animPts.geometry.attributes.position.needsUpdate = true;
        }

      // ── Phase 3a: Fade overlay IN (black out point cloud) ────────────────
      } else if (t < T_FADE_OUT) {
        const p = (t - T_PAUSE) / (T_FADE_OUT - T_PAUSE);
        overlay.style.opacity = p;

      // ── Phase 3b: Swap + fade overlay OUT (reveal splat) ─────────────────
      } else {
        if (!swapped) {
          swapped         = true;
          animPts.visible = false;
          splat.visible   = true;
        }
        const p = Math.min(1, (t - T_SWAP) / (T_FADE_IN - T_SWAP));
        overlay.style.opacity = 1 - p;
      }

      if (t < T_TOTAL) {
        animRaf = requestAnimationFrame(tick);
      } else {
        // Done — clean up overlay, restore controls
        animRaf = null;
        overlay.style.opacity = 0;
        animPts.visible = false;
        splat.visible   = true;
        if (controls) {
          controls.enabled      = true;
          controls.enablePan    = true;
          controls.enableZoom   = true;
          controls.enableRotate = true;
          controls.update();
        }
        resolve();
      }
    }
    animRaf = requestAnimationFrame(tick);
  });
}

function _buildAnimCloud() {
  const splat = activeViewer.splatMesh;
  const total = splat.getSplatCount();
  const n = Math.floor(total / ANIM_STEP);
  const pos = new Float32Array(n * 3);
  const col = new Float32Array(n * 3);
  const cv = new THREE.Vector3(), cc = new THREE.Vector4();
  let sx = 0, sy = 0, sz = 0;

  for (let i = 0; i < n; i++) {
    splat.getSplatCenter(i * ANIM_STEP, cv, false);
    splat.getSplatColor(i * ANIM_STEP, cc);
    pos[i*3] = cv.x; pos[i*3+1] = cv.y; pos[i*3+2] = cv.z;
    col[i*3] = cc.x; col[i*3+1] = cc.y; col[i*3+2] = cc.z;
    sx += cv.x; sy += cv.y; sz += cv.z;
  }

  animCX = sx/n; animCY = sy/n; animCZ = sz/n;
  animOrigPos = pos.slice();

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  animPts = new THREE.Points(geo,
    new THREE.PointsMaterial({ size: 0.022, vertexColors: true, sizeAttenuation: true,
                                transparent: true, depthWrite: false, opacity: 1.0 }));
  animPts.rotation.copy(splat.rotation);
  animPts.visible = false;
  activeViewer.threeScene.add(animPts);
}

// ── 1. Shockwave — spherical blast ring propagates from centroid ────────────
function _tickShockwave(t) {
  const arr  = animPts.geometry.attributes.position.array;
  const orig = animOrigPos;
  const n    = arr.length / 3;
  const PERIOD = 2.8, SPEED = 7, WIDTH = 0.45, STRENGTH = 0.55;
  const waveR = ((t % PERIOD) / PERIOD) * SPEED;

  for (let i = 0; i < n; i++) {
    const ox = orig[i*3]-animCX, oy = orig[i*3+1]-animCY, oz = orig[i*3+2]-animCZ;
    const d  = Math.sqrt(ox*ox + oy*oy + oz*oz) + 1e-4;
    const inf = Math.exp(-((d - waveR) ** 2) / (WIDTH * WIDTH)) * STRENGTH;
    arr[i*3]   = orig[i*3]   + (ox/d) * inf;
    arr[i*3+1] = orig[i*3+1] + (oy/d) * inf;
    arr[i*3+2] = orig[i*3+2] + (oz/d) * inf;
  }
  animPts.geometry.attributes.position.needsUpdate = true;
}

// ── 2. Vortex — differential rotation, inner points spin faster ────────────
function _tickVortex(t) {
  const arr  = animPts.geometry.attributes.position.array;
  const orig = animOrigPos;
  const n    = arr.length / 3;

  for (let i = 0; i < n; i++) {
    const ox = orig[i*3]   - animCX;
    const oy = orig[i*3+1] - animCY;
    const oz = orig[i*3+2] - animCZ;
    const r = Math.sqrt(ox*ox + oz*oz) + 1e-4;
    const speed = 1.0 / (r * 0.35 + 0.25);
    const angle = Math.atan2(oz, ox) + t * speed;
    arr[i*3]   = animCX + r * Math.cos(angle);
    arr[i*3+1] = animCY + oy + Math.sin(t * 0.5 + r * 1.2) * 0.12;
    arr[i*3+2] = animCZ + r * Math.sin(angle);
  }
  animPts.geometry.attributes.position.needsUpdate = true;
}

// ── 3. Big Bang — explosion, float, then magnetic snap back ────────────────
function _tickBigBang(t) {
  const arr  = animPts.geometry.attributes.position.array;
  const orig = animOrigPos;
  const n    = arr.length / 3;
  const PERIOD = 5.0;
  const phase  = (t % PERIOD) / PERIOD;

  // Smooth ease: explode 0→0.3, hold 0.3→0.55, implode 0.55→0.85, hold 0.85→1
  let f;
  if      (phase < 0.30) { const p = phase / 0.30;       f = p*p*(3-2*p); }
  else if (phase < 0.55) { f = 1.0; }
  else if (phase < 0.85) { const p = (phase-0.55)/0.30;  f = 1-p*p*(3-2*p); }
  else                   { f = 0.0; }

  for (let i = 0; i < n; i++) {
    const ox = orig[i*3]-animCX, oy = orig[i*3+1]-animCY, oz = orig[i*3+2]-animCZ;
    const d  = Math.sqrt(ox*ox + oy*oy + oz*oz) + 1e-4;
    // Per-point variation using a fast hash
    const h  = (Math.sin(i * 127.1 + 311.7) * 43758.5453) % 1;
    const sc = 4.0 + h * 3.0;
    arr[i*3]   = orig[i*3]   + (ox/d) * sc * f;
    arr[i*3+1] = orig[i*3+1] + (oy/d) * sc * f;
    arr[i*3+2] = orig[i*3+2] + (oz/d) * sc * f;
  }
  animPts.geometry.attributes.position.needsUpdate = true;
}

// ── 4. Neural Mesh — k-NN wireframe that pulses with energy ────────────────
function _buildNeuralMesh() {
  const MSTEP = 5;   // use every 5th anim point → ~1200 pts for 50k splat model
  const orig  = animOrigPos;
  const total = Math.floor(orig.length / 3);
  const n     = Math.floor(total / MSTEP);
  const K     = 4;
  const verts = [];

  for (let i = 0; i < n; i++) {
    const ix = orig[i*MSTEP*3], iy = orig[i*MSTEP*3+1], iz = orig[i*MSTEP*3+2];
    const dists = [];
    for (let j = 0; j < n; j++) {
      if (i === j) continue;
      const dx = orig[j*MSTEP*3]-ix, dy = orig[j*MSTEP*3+1]-iy, dz = orig[j*MSTEP*3+2]-iz;
      dists.push([j, dx*dx + dy*dy + dz*dz]);
    }
    dists.sort((a, b) => a[1] - b[1]);
    for (let k = 0; k < K; k++) {
      const j = dists[k][0];
      if (j > i) {
        verts.push(ix, iy, iz,
                   orig[j*MSTEP*3], orig[j*MSTEP*3+1], orig[j*MSTEP*3+2]);
      }
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
  animLines = new THREE.LineSegments(geo,
    new THREE.LineBasicMaterial({ color: 0x00ddff, transparent: true, opacity: 0.35 }));
  animLines.rotation.copy(activeViewer.splatMesh.rotation);
  activeViewer.threeScene.add(animLines);

  // Dim point cloud so mesh reads clearly
  animPts.material.opacity = 0.3;
  animPts.material.transparent = true;
}

function _tickMesh(t) {
  if (!animLines) return;
  const pulse = (Math.sin(t * 2.2) + 1) * 0.5;
  animLines.material.opacity = 0.15 + pulse * 0.55;
  const r = 0.2 + pulse * 0.6, g = 0.7 + pulse * 0.3, b = 1.0;
  animLines.material.color.setRGB(r, g, b);
  animPts.material.size = 0.018 + pulse * 0.018;
}

// ── 5. Wave — sine surface undulates across the room ───────────────────────
function _tickWave(t) {
  const arr  = animPts.geometry.attributes.position.array;
  const orig = animOrigPos;
  const n    = arr.length / 3;
  const AMP = 0.28, FQ = 0.7;

  for (let i = 0; i < n; i++) {
    const ox = orig[i*3], oy = orig[i*3+1], oz = orig[i*3+2];
    const w = Math.sin((ox - animCX) * FQ + t * 2.0)
            * Math.cos((oz - animCZ) * FQ * 0.6 + t * 1.4);
    arr[i*3]   = ox;
    arr[i*3+1] = oy + w * AMP;
    arr[i*3+2] = oz;
  }
  animPts.geometry.attributes.position.needsUpdate = true;
}

function togglePointCloud() {
  if (!activeViewer) return;
  pointCloudMode = !pointCloudMode;

  if (pointCloudMode) {
    if (!pointsObject) pointsObject = buildPointCloud();
    if (pointsObject) pointsObject.visible = true;
    activeViewer.splatMesh.visible = false;
    pcBtn.textContent = '✦ Splat View';
    pcBtn.classList.add('active');
  } else {
    if (pointsObject) pointsObject.visible = false;
    activeViewer.splatMesh.visible = true;
    pcBtn.textContent = '⬡ Point Cloud';
    pcBtn.classList.remove('active');
  }
}

function buildPointCloud() {
  const mesh  = activeViewer.splatMesh;
  const total = mesh.getSplatCount ? mesh.getSplatCount() : (mesh.splatRenderCount || 0);
  if (!total) return null;

  const step  = 4;  // sample every 4th splat (~125k points)
  const count = Math.floor(total / step);

  const positions = new Float32Array(count * 3);
  const colors    = new Float32Array(count * 3);
  const center    = new THREE.Vector3();
  const color     = new THREE.Vector4();

  for (let i = 0; i < count; i++) {
    mesh.getSplatCenter(i * step, center, false);
    positions[i * 3]     = center.x;
    positions[i * 3 + 1] = center.y;
    positions[i * 3 + 2] = center.z;

    if (mesh.getSplatColor) {
      mesh.getSplatColor(i * step, color);
      colors[i * 3]     = color.x;
      colors[i * 3 + 1] = color.y;
      colors[i * 3 + 2] = color.z;
    } else {
      colors[i * 3] = colors[i * 3 + 1] = colors[i * 3 + 2] = 0.85;
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({ size: 0.015, vertexColors: true, sizeAttenuation: true });
  const pts = new THREE.Points(geo, mat);
  pts.rotation.copy(mesh.rotation);  // match the splat's rotation
  activeViewer.threeScene.add(pts);
  return pts;
}

// ── Base image helper ─────────────────────────────────────────────────────────
async function currentBaseFile() {
  if (lastEditedUrl) {
    const blob = await fetch(lastEditedUrl).then(r => r.blob());
    return new File([blob], 'base.jpg', { type: blob.type || 'image/jpeg' });
  }
  return uploadedFile;
}

// ── Viewer ────────────────────────────────────────────────────────────────────
function loadPly(plyPath) {
  currentPlyUrl = plyPath;
  return new Promise((resolve, reject) => {
    const root = document.getElementById('gs-root');

    if (animRaf) stopAnim();
    animPts = null; animOrigPos = null;  // force rebuild for new scene

    if (activeViewer) {
      try { activeViewer.dispose(); } catch {}
      activeViewer = null;
    }
    root.innerHTML = '';

    const viewer = new GS.Viewer({
      rootElement:        root,
      selfDrivenMode:     true,
      useBuiltInControls: true,
      gpuAcceleratedSort: false,
      sceneRevealMode:    2,   // instant reveal
    });
    activeViewer = viewer;

    viewer.addSplatScene(plyPath, {
      splatAlphaRemovalThreshold: 5,
      showLoadingUI: false,
    })
    .then(() => {
      viewer.splatMesh.rotation.y = THREE.MathUtils.degToRad(-160);

      const box    = viewer.splatMesh.computeBoundingBox(true);
      const center = new THREE.Vector3();
      const size   = new THREE.Vector3();
      box.getCenter(center);
      box.getSize(size);

      // Use bounding sphere radius so camera distance is correct regardless of rotation
      const radius = size.length() * 0.5;
      // radius * 1 = 50% closer than the old radius*2 default
      const camPos = center.clone().add(new THREE.Vector3(0, 0, radius * 1));
      viewer.camera.position.copy(camPos);
      viewer.camera.up.set(0, -1, 0);
      viewer.camera.lookAt(center);
      if (viewer.controls) {
        viewer.controls.target.copy(center);
        viewer.controls.minDistance = 0.1;
        viewer.controls.maxDistance = Infinity;
        viewer.controls.update();
        viewer.controls.saveState();   // lock this as the reset position
      }
      viewer.start();
      // Wait for render loop to initialise, then nudge camera to trigger
      // the initial Gaussian sort (otherwise first frame is unsorted/blurry)
      setTimeout(() => {
        const cam = viewer.camera;
        const step = size.length() * 0.05;   // 5% of scene size — visible but snaps back
        cam.position.z += step;
        if (viewer.controls) viewer.controls.update();
        requestAnimationFrame(() => {
          cam.position.z -= step;
          if (viewer.controls) viewer.controls.update();
          resolve();
        });
      }, 300);
    })
    .catch(reject);
  });
}

// ── Log helpers ───────────────────────────────────────────────────────────────
function scrollLog() {
  const log = document.getElementById('log');
  log.scrollTop = log.scrollHeight;
}

function addRunDivider(n, prompt) {
  const el = document.createElement('div');
  el.style.cssText = 'padding:10px 14px 6px; border-top:1px solid #222; margin-top:4px;';
  el.innerHTML = `
    <div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#444">Run ${n}</div>
    <div style="font-size:10.5px;color:#555;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${prompt}">${prompt}</div>`;
  document.getElementById('log').appendChild(el);
  scrollLog();
}

function addPreview(src, label) {
  const el = document.createElement('div');
  el.className = 'preview-block';
  el.innerHTML = `<div class="plabel">${label}</div><img src="${src}">`;
  document.getElementById('log').appendChild(el);
  scrollLog();
}

function upsertStep(id, label, status, detail, image) {
  const log = document.getElementById('log');
  const now = Date.now();

  if (status === 'running' && !stepStarts[id]) stepStarts[id] = now;

  const timeStr = () => {
    if (!stepStarts[id]) return '';
    const ms = Date.now() - stepStarts[id];
    return status === 'running'
      ? `${(ms / 1000).toFixed(1)}s`
      : `${(ms / 1000).toFixed(1)}s`;
  };

  if (stepEls[id]) {
    const el = stepEls[id];
    el.className = `step ${status}`;
    el.querySelector('.step-label').textContent  = label;
    el.querySelector('.step-detail').textContent = detail;
    el.querySelector('.step-icon').innerHTML     = iconFor(status);
    el.querySelector('.step-time').textContent   = timeStr();
    if (image) {
      const previewId = `preview-${id}`;
      if (!document.getElementById(previewId)) {
        const p = document.createElement('div');
        p.id = previewId;
        p.className = 'preview-block';
        p.innerHTML = `<div class="plabel">${label}</div><img src="${image}">`;
        el.insertAdjacentElement('afterend', p);
      }
    }
    scrollLog();
  } else {
    const el = document.createElement('div');
    el.className = `step ${status}`;
    el.innerHTML = `
      <div class="step-icon">${iconFor(status)}</div>
      <div class="step-body">
        <div class="step-label">${label}</div>
        <div class="step-detail">${detail}</div>
      </div>
      <div class="step-time">${timeStr()}</div>`;
    log.appendChild(el);
    stepEls[id] = el;
    scrollLog();
  }
}

// Camera HUD — updates every frame
const camHud = document.getElementById('cam-hud');
camHud.style.display = 'block';
(function hudLoop() {
  if (activeViewer) {
    const cam = activeViewer.camera;
    const tgt = activeViewer.controls ? activeViewer.controls.target : new THREE.Vector3();
    const dist = cam.position.distanceTo(tgt).toFixed(3);
    camHud.textContent = `cam dist: ${dist}`;
  }
  requestAnimationFrame(hudLoop);
})();

// Tick running steps every second
setInterval(() => {
  for (const [id, el] of Object.entries(stepEls)) {
    if (el.classList.contains('running') && stepStarts[id]) {
      const ms = Date.now() - stepStarts[id];
      el.querySelector('.step-time').textContent = `${(ms/1000).toFixed(1)}s`;
    }
  }
}, 1000);

function iconFor(status) {
  if (status === 'done')    return '<span style="color:#4ade80;font-size:11px">✓</span>';
  if (status === 'running') return '<div class="spin-ring"></div>';
  if (status === 'error')   return '<span style="color:#f87171;font-size:11px">✗</span>';
  return '<span style="color:#444;font-size:11px">○</span>';
}
